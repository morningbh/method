{% extends "base.html" %}
{% block content %}
<section data-state="initial">
  <h1>登录 Method</h1>
  <form id="login-form">
    <label for="email">邮箱</label>
    <input id="email" type="email" name="email" required>
    <button type="submit">发送验证码</button>
  </form>
</section>

<section data-state="code-sent" hidden>
  <h1>输入验证码</h1>
  <form id="code-form">
    <label for="code">6 位验证码</label>
    <input id="code" type="text" name="code" inputmode="numeric" pattern="\d{6}" maxlength="6" required>
    <button type="submit">登录</button>
  </form>
</section>

<section data-state="pending" hidden>
  <h1>等待审批</h1>
  <p>注册申请已提交，管理员批准后会发送登录验证码。</p>
</section>
{% endblock %}
